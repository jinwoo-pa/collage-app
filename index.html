<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>사진 콜라쥬 메이커</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --text-xs:clamp(0.75rem,.7rem + .25vw,.875rem);
      --text-sm:clamp(0.875rem,.8rem + .35vw,1rem);
      --text-base:clamp(1rem,.95rem + .25vw,1.125rem);
      --text-lg:clamp(1.125rem,1rem + .75vw,1.5rem);
      --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
      --sp1:.25rem;--sp2:.5rem;--sp3:.75rem;--sp4:1rem;--sp5:1.25rem;--sp6:1.5rem;--sp8:2rem;
      --bg:#f7f6f2;--surf:#f9f8f5;--surf2:#fbfbf9;
      --border:#d4d1ca;--text:#28251d;--muted:#7a7974;
      --primary:#01696f;--primary-h:#0c4e54;--primary-hl:#cedcd8;
      --r-md:.5rem;--r-lg:.75rem;--r-xl:1rem;--r-full:9999px;
      --sh-sm:0 1px 2px rgba(40,37,29,.06);--sh-md:0 4px 12px rgba(40,37,29,.09);
      --ease:180ms cubic-bezier(.16,1,.3,1);
      --font:'Satoshi','Inter',sans-serif;
    }
    [data-theme="dark"]{
      --bg:#171614;--surf:#1c1b19;--surf2:#201f1d;
      --border:#393836;--text:#cdccca;--muted:#797876;
      --primary:#4f98a3;--primary-h:#227f8b;--primary-hl:#313b3b;
      --sh-sm:0 1px 2px rgba(0,0,0,.2);--sh-md:0 4px 12px rgba(0,0,0,.3);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;touch-action:manipulation}
    body{min-height:100dvh;font-family:var(--font);font-size:var(--text-base);color:var(--text);background:var(--bg)}
    button,input,select{font:inherit;cursor:pointer}
    button{border:none;transition:all var(--ease)}
    button:active{opacity:.75;transform:scale(.97)}
    img,canvas{display:block;max-width:100%}

    /* ── PAGE LAYOUT ── */
    .page{display:grid;grid-template-rows:auto 1fr auto;min-height:100dvh}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:var(--sp3) var(--sp4);background:var(--surf);border-bottom:1px solid rgba(40,37,29,.1);position:sticky;top:0;z-index:50;gap:var(--sp3)}
    .topbar-logo{display:flex;align-items:center;gap:var(--sp2)}
    .topbar-logo svg{width:28px;height:28px;color:var(--primary);flex-shrink:0}
    .topbar-logo h1{font-size:var(--text-base);font-weight:700;line-height:1}
    .muted{color:var(--muted);font-size:var(--text-sm)}
    .theme-btn{width:44px;height:44px;min-width:44px;border-radius:var(--r-full);background:var(--surf2);border:1px solid var(--border);color:var(--text);display:grid;place-items:center}

    /* ── MAIN CONTENT ── */
    .content{padding:var(--sp4);display:grid;gap:var(--sp5);max-width:760px;margin:0 auto;width:100%}

    /* ── UPLOAD ── */
    .upload-zone{border:2px dashed var(--border);border-radius:var(--r-lg);padding:var(--sp6) var(--sp4);text-align:center;background:var(--surf2);cursor:pointer;display:block;transition:all var(--ease);min-height:44px}
    .upload-zone:active{border-color:var(--primary);background:var(--primary-hl)}
    .upload-zone input{display:none}
    .upload-icon{width:28px;height:28px;margin:0 auto var(--sp2);color:var(--primary)}

    /* ── LAYOUT CONTROLS ── */
    .controls-card{background:var(--surf);border:1px solid rgba(40,37,29,.1);border-radius:var(--r-xl);padding:var(--sp4);display:grid;gap:var(--sp4);box-shadow:var(--sh-sm)}
    .controls-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--sp3)}
    .field{display:grid;gap:var(--sp1)}
    .field label{font-size:var(--text-xs);font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
    .field select{width:100%;padding:.7rem .8rem;border:1px solid var(--border);border-radius:var(--r-md);background:var(--surf2);color:var(--text);font-size:var(--text-sm);min-height:44px}
    .field input[type="color"]{width:100%;height:44px;padding:.2rem .3rem;border:1px solid var(--border);border-radius:var(--r-md);background:var(--surf2)}
    .field input[type="range"]{width:100%;accent-color:var(--primary);border:none;background:none;height:28px}
    .range-row{display:flex;justify-content:space-between;align-items:center}

    /* ── CANVAS ── */
    .canvas-card{background:var(--surf);border:1px solid rgba(40,37,29,.1);border-radius:var(--r-xl);padding:var(--sp3);box-shadow:var(--sh-md)}
    #collageCanvas{width:100%;border-radius:calc(var(--r-xl) - var(--sp3));background:#fff;aspect-ratio:1;touch-action:none}

    /* ── FOCUS PANEL ── */
    .focus-card{background:var(--surf);border:2px solid var(--primary);border-radius:var(--r-xl);padding:var(--sp4);box-shadow:var(--sh-md);display:none;gap:var(--sp4);grid-template-rows:auto}
    .focus-card.visible{display:grid}
    .focus-card-header{display:flex;align-items:center;justify-content:space-between;gap:var(--sp2)}
    .focus-card-header h3{font-size:var(--text-base);font-weight:700;display:flex;align-items:center;gap:var(--sp2)}
    .focus-preview-wrap{position:relative;aspect-ratio:1;border-radius:var(--r-lg);overflow:hidden;background:var(--bg);border:1px solid var(--border);touch-action:none;user-select:none}
    #focusPreviewCanvas{width:100%;height:100%;display:block;touch-action:none}
    .focus-grid-lines{position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(90deg,transparent,transparent calc(33.3% - 0.5px),rgba(255,255,255,.5) calc(33.3% - 0.5px),rgba(255,255,255,.5) 33.3%),repeating-linear-gradient(0deg,transparent,transparent calc(33.3% - 0.5px),rgba(255,255,255,.5) calc(33.3% - 0.5px),rgba(255,255,255,.5) 33.3%)}
    .zoom-row{display:flex;align-items:center;gap:var(--sp3)}
    .zoom-row label{font-size:var(--text-sm);font-weight:500;white-space:nowrap;min-width:2rem}
    .zoom-row input{flex:1;accent-color:var(--primary);border:none;background:none;height:36px}

    /* ── THUMBS ── */
    .thumbs-card{background:var(--surf);border:1px solid rgba(40,37,29,.1);border-radius:var(--r-xl);padding:var(--sp4);box-shadow:var(--sh-sm)}
    .thumbs-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--sp3)}
    .thumbs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:var(--sp2)}
    .thumb{position:relative;aspect-ratio:1;border-radius:var(--r-lg);overflow:hidden;background:var(--surf2);border:2px solid transparent;cursor:pointer;transition:border-color var(--ease),box-shadow var(--ease);touch-action:none;user-select:none}
    .thumb.active{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-hl)}
    .thumb.drag-ghost{opacity:.3;transform:scale(.95)}
    .thumb.drag-target{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-hl);transform:scale(1.06)}
    .thumb img{width:100%;height:100%;object-fit:cover;pointer-events:none;user-select:none}
    .thumb .badge{position:absolute;top:4px;left:4px;background:rgba(1,105,111,.85);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:var(--r-full);pointer-events:none}
    .thumb .del{position:absolute;top:4px;right:4px;width:28px;height:28px;min-width:28px;border-radius:var(--r-full);background:rgba(0,0,0,.6);color:#fff;display:grid;place-items:center;padding:0}
    .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:130px;color:var(--muted);gap:var(--sp2);font-size:var(--text-sm);text-align:center}

    /* ── BOTTOM ACTION BAR ── */
    .action-bar{position:sticky;bottom:0;background:var(--surf);border-top:1px solid rgba(40,37,29,.1);padding:var(--sp3) var(--sp4);display:grid;grid-template-columns:1fr 1fr;gap:var(--sp3);z-index:40}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:0 1rem;height:52px;border-radius:var(--r-md);font-size:var(--text-sm);font-weight:700;line-height:1;min-height:44px}
    .btn svg{width:18px;height:18px;flex-shrink:0}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-primary:active{background:var(--primary-h)}
    .btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border)}
    .btn-ghost:active{background:var(--surf2)}

    /* ── TAG ── */
    .tag{display:inline-flex;align-items:center;gap:4px;font-size:var(--text-xs);font-weight:600;padding:3px 9px;border-radius:var(--r-full);background:var(--primary-hl);color:var(--primary)}

    /* ── HINT ── */
    .hint{font-size:var(--text-xs);color:var(--muted);display:flex;align-items:center;gap:var(--sp2);padding:var(--sp2) var(--sp3);background:var(--surf2);border-radius:var(--r-md);border:1px solid rgba(40,37,29,.07)}
    .hint svg{width:14px;height:14px;flex-shrink:0;color:var(--primary)}
  </style>
</head>
<body>
<div class="page">

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="topbar-logo">
      <svg viewBox="0 0 64 64" fill="none" aria-label="로고">
        <rect x="8" y="8" width="22" height="22" rx="5" stroke="currentColor" stroke-width="4"/>
        <rect x="34" y="8" width="22" height="22" rx="5" stroke="currentColor" stroke-width="4"/>
        <rect x="8" y="34" width="22" height="22" rx="5" stroke="currentColor" stroke-width="4"/>
        <rect x="34" y="34" width="22" height="22" rx="5" stroke="currentColor" stroke-width="4" fill="currentColor" fill-opacity=".15"/>
        <path d="M45 40v10M40 45h10" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>
      </svg>
      <h1>사진 콜라쥬 메이커</h1>
    </div>
    <div style="display:flex;align-items:center;gap:var(--sp2)">
      <p class="muted"><strong id="photoCount">0</strong>장</p>
      <button class="theme-btn" id="themeToggle" aria-label="다크 모드"></button>
    </div>
  </header>

  <!-- MAIN -->
  <main class="content">

    <!-- 업로드 -->
    <label class="upload-zone" for="fileInput">
      <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
      <strong>사진 선택하기</strong>
      <p class="muted" style="margin-top:.2rem;font-size:var(--text-xs)">여러 장을 한 번에 선택 가능</p>
      <input id="fileInput" type="file" accept="image/*" multiple>
    </label>

    <!-- 레이아웃 설정 -->
    <div class="controls-card">
      <div class="controls-grid">
        <div class="field">
          <label for="layoutType">배치 방식</label>
          <select id="layoutType">
            <option value="grid">격자형</option>
            <option value="masonry">세로 강조형</option>
            <option value="strip">가로 스트립</option>
          </select>
        </div>
        <div class="field">
          <label for="columns">열 개수</label>
          <select id="columns">
            <option value="2">2열</option>
            <option value="3" selected>3열</option>
            <option value="4">4열</option>
          </select>
        </div>
        <div class="field">
          <div class="range-row"><label for="bgColor">배경색</label></div>
          <input id="bgColor" type="color" value="#ffffff">
        </div>
        <div class="field">
          <div class="range-row"><label for="gapSize">간격</label><span id="gapVal" class="muted" style="font-size:var(--text-xs)">8px</span></div>
          <input id="gapSize" type="range" min="0" max="40" value="8">
        </div>
      </div>
    </div>

    <!-- 콜라쥬 캔버스 -->
    <div class="canvas-card">
      <div class="hint" style="margin-bottom:var(--sp3)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        사진을 탭하면 초점·구도를 조정할 수 있어요
      </div>
      <canvas id="collageCanvas" width="1200" height="1200"></canvas>
    </div>

    <!-- 초점 편집 패널 (사진 탭하면 나타남) -->
    <div id="focusCard" class="focus-card">
      <div class="focus-card-header">
        <h3>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
          초점·구도 편집
        </h3>
        <div style="display:flex;gap:var(--sp2)">
          <button id="resetFocus" class="btn btn-ghost" style="height:40px;padding:0 var(--sp3);font-size:var(--text-xs)">초기화</button>
          <button id="focusClose" class="btn btn-ghost" style="height:40px;padding:0 var(--sp3);font-size:var(--text-xs)">닫기</button>
        </div>
      </div>
      <p class="muted" style="font-size:var(--text-xs)" id="focusInfo">사진을 탭해 선택하세요</p>
      <div class="focus-preview-wrap" id="focusPreviewWrap">
        <canvas id="focusPreviewCanvas" width="400" height="400"></canvas>
        <div class="focus-grid-lines"></div>
      </div>
      <div class="zoom-row">
        <label for="zoomSlider">줌</label>
        <input id="zoomSlider" type="range" min="100" max="250" value="100">
        <span id="zoomVal" class="muted" style="font-size:var(--text-xs);min-width:36px">100%</span>
      </div>
    </div>

    <!-- 썸네일 (순서 변경) -->
    <div class="thumbs-card">
      <div class="thumbs-header">
        <h3 style="font-size:var(--text-base);font-weight:700">사진 순서 편집</h3>
        <span class="tag">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 9l4-4 4 4M9 5v14M19 15l-4 4-4-4M15 19V5"/></svg>
          길게 눌러 순서 변경
        </span>
      </div>
      <div id="thumbs" class="thumbs-grid"></div>
    </div>

  </main>

  <!-- BOTTOM ACTION BAR -->
  <div class="action-bar">
    <button class="btn btn-primary" id="downloadBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      PNG 저장
    </button>
    <button class="btn btn-ghost" id="clearBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
      전체 삭제
    </button>
  </div>
</div>

<script>
/* ─── state ─── */
let photos = [];
let selectedIdx = null;
let cellMap = [];

/* ─── DOM ─── */
const fileInput     = document.getElementById('fileInput');
const layoutType    = document.getElementById('layoutType');
const columns       = document.getElementById('columns');
const gapSize       = document.getElementById('gapSize');
const gapVal        = document.getElementById('gapVal');
const bgColor       = document.getElementById('bgColor');
const downloadBtn   = document.getElementById('downloadBtn');
const clearBtn      = document.getElementById('clearBtn');
const canvas        = document.getElementById('collageCanvas');
const ctx           = canvas.getContext('2d');
const thumbsEl      = document.getElementById('thumbs');
const photoCountEl  = document.getElementById('photoCount');
const themeToggle   = document.getElementById('themeToggle');
const focusCard     = document.getElementById('focusCard');
const focusClose    = document.getElementById('focusClose');
const focusCvs      = document.getElementById('focusPreviewCanvas');
const focusCtx      = focusCvs.getContext('2d');
const focusInfo     = document.getElementById('focusInfo');
const zoomSlider    = document.getElementById('zoomSlider');
const zoomVal       = document.getElementById('zoomVal');
const resetFocus    = document.getElementById('resetFocus');
const html          = document.documentElement;

/* ─── theme ─── */
let theme = matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
html.setAttribute('data-theme', theme);
function setThemeIcon(){
  themeToggle.innerHTML = theme==='dark'
    ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
    : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
}
setThemeIcon();
themeToggle.addEventListener('click', () => { theme=theme==='dark'?'light':'dark'; html.setAttribute('data-theme',theme); setThemeIcon(); });

/* ─── helpers ─── */
function readFile(f){ return new Promise((r,j)=>{ const fr=new FileReader(); fr.onload=()=>r(fr.result); fr.onerror=j; fr.readAsDataURL(f); }); }
function loadImg(src){ return new Promise((r,j)=>{ const i=new Image(); i.onload=()=>r(i); i.onerror=j; i.src=src; }); }
function uid(){ return Math.random().toString(36).slice(2); }
function getPointerXY(e){ return e.touches ? {x:e.touches[0].clientX, y:e.touches[0].clientY} : {x:e.clientX, y:e.clientY}; }

/* ─── file input ─── */
fileInput.addEventListener('change', async e => {
  for (const f of Array.from(e.target.files||[])){
    const src = await readFile(f);
    const img = await loadImg(src);
    photos.push({ id:uid(), src, img, ox:0.5, oy:0.5, zoom:1 });
  }
  e.target.value='';
  renderThumbs(); renderCollage();
});

/* ─── settings ─── */
gapSize.addEventListener('input',    () => { gapVal.textContent=gapSize.value+'px'; renderCollage(); });
layoutType.addEventListener('change',() => renderCollage());
columns.addEventListener('change',   () => renderCollage());
bgColor.addEventListener('input',    () => renderCollage());
clearBtn.addEventListener('click',   () => { photos=[]; selectedIdx=null; hideFocus(); renderThumbs(); renderCollage(); });
downloadBtn.addEventListener('click', download);

/* ═══════════════════════════════════════════
   CANVAS TAP → SELECT PHOTO
═══════════════════════════════════════════ */
function getCanvasXY(e){
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width / rect.width;
  const sy = canvas.height / rect.height;
  const pt = e.touches ? e.touches[0] : e;
  return { x:(pt.clientX-rect.left)*sx, y:(pt.clientY-rect.top)*sy };
}

function handleCanvasTap(e){
  if (!cellMap.length) return;
  const {x,y} = getCanvasXY(e);
  for (const cell of cellMap){
    if (x>=cell.x && x<=cell.x+cell.w && y>=cell.y && y<=cell.y+cell.h){
      selectPhoto(cell.idx); return;
    }
  }
  deselectPhoto();
}
canvas.addEventListener('click',      handleCanvasTap);
canvas.addEventListener('touchend',   e => { e.preventDefault(); handleCanvasTap(e.changedTouches ? {touches:e.changedTouches} : e); }, {passive:false});

function selectPhoto(idx){
  selectedIdx=idx;
  showFocus(idx);
  renderCollage(); renderThumbs();
}
function deselectPhoto(){
  selectedIdx=null;
  hideFocus();
  renderCollage(); renderThumbs();
}
focusClose.addEventListener('click', deselectPhoto);

/* ═══════════════════════════════════════════
   FOCUS EDITOR
═══════════════════════════════════════════ */
function showFocus(idx){
  const p = photos[idx];
  focusCard.classList.add('visible');
  zoomSlider.value = Math.round(p.zoom*100);
  zoomVal.textContent = Math.round(p.zoom*100)+'%';
  focusInfo.textContent = `사진 ${idx+1} · 미리보기를 드래그해서 구도를 잡으세요`;
  // scroll into view
  setTimeout(() => focusCard.scrollIntoView({behavior:'smooth', block:'nearest'}), 100);
  drawFocusPreview(idx);
}
function hideFocus(){ focusCard.classList.remove('visible'); }

zoomSlider.addEventListener('input', () => {
  if (selectedIdx===null) return;
  photos[selectedIdx].zoom = zoomSlider.value/100;
  zoomVal.textContent = zoomSlider.value+'%';
  drawFocusPreview(selectedIdx); renderCollage();
});
resetFocus.addEventListener('click', () => {
  if (selectedIdx===null) return;
  photos[selectedIdx].ox=0.5; photos[selectedIdx].oy=0.5; photos[selectedIdx].zoom=1;
  zoomSlider.value=100; zoomVal.textContent='100%';
  drawFocusPreview(selectedIdx); renderCollage();
});

/* ── focus preview: unified pointer/touch drag ── */
let fpDrag=false, fpLast={x:0,y:0};

function fpStart(e){
  fpDrag=true;
  fpLast = getPointerXY(e);
}
function fpMove(e){
  if (!fpDrag||selectedIdx===null) return;
  const cur = getPointerXY(e);
  const dx = cur.x - fpLast.x;
  const dy = cur.y - fpLast.y;
  fpLast = cur;
  const p = photos[selectedIdx];
  const sens = 0.003 / p.zoom;
  p.ox = Math.max(0, Math.min(1, p.ox - dx*sens));
  p.oy = Math.max(0, Math.min(1, p.oy - dy*sens));
  drawFocusPreview(selectedIdx); renderCollage();
}
function fpEnd(){ fpDrag=false; }

focusCvs.addEventListener('mousedown',  fpStart);
focusCvs.addEventListener('touchstart', e => { e.preventDefault(); fpStart(e); }, {passive:false});
window.addEventListener('mousemove',    fpMove);
window.addEventListener('touchmove',    e => { if(fpDrag){ e.preventDefault(); fpMove(e); } }, {passive:false});
window.addEventListener('mouseup',      fpEnd);
window.addEventListener('touchend',     fpEnd);

function drawFocusPreview(idx){
  const p = photos[idx];
  const img = p.img;
  const size = focusCvs.width;
  focusCtx.clearRect(0,0,size,size);

  /* dim full image */
  const sc = Math.min(size/img.width, size/img.height);
  const fw=img.width*sc, fh=img.height*sc;
  focusCtx.globalAlpha=0.2;
  focusCtx.drawImage(img, (size-fw)/2, (size-fh)/2, fw, fh);
  focusCtx.globalAlpha=1;

  /* crop window */
  const zoom=p.zoom, destRatio=1, srcRatio=img.width/img.height;
  let sw, sh;
  if(srcRatio>destRatio){ sw=img.height*destRatio/zoom; sh=img.height/zoom; }
  else                   { sw=img.width/zoom; sh=img.width/destRatio/zoom; }
  let sx=(img.width-sw)*p.ox, sy=(img.height-sh)*p.oy;
  sx=Math.max(0,Math.min(img.width-sw,sx));
  sy=Math.max(0,Math.min(img.height-sh,sy));
  focusCtx.drawImage(img, sx, sy, sw, sh, 0, 0, size, size);
}

/* ═══════════════════════════════════════════
   COLLAGE RENDERING
═══════════════════════════════════════════ */
function renderCollage(){
  const gap=Number(gapSize.value), cols=Number(columns.value), mode=layoutType.value;
  cellMap=[];
  ctx.fillStyle=bgColor.value; ctx.fillRect(0,0,canvas.width,canvas.height);
  if(!photos.length){ drawEmpty(); return; }
  if(mode==='grid')    buildGrid(cols,gap);
  else if(mode==='strip') buildStrip(gap);
  else                 buildMasonry(cols,gap);
  cellMap.forEach(cell=>{
    const p=photos[cell.idx];
    coverDraw(p.img, cell.x, cell.y, cell.w, cell.h, p.ox, p.oy, p.zoom);
    if(selectedIdx===cell.idx){
      ctx.save();
      roundPath(cell.x,cell.y,cell.w,cell.h,16);
      ctx.strokeStyle='rgba(1,105,111,.95)'; ctx.lineWidth=10; ctx.stroke();
      ctx.fillStyle='rgba(1,105,111,.15)'; ctx.fill();
      ctx.restore();
      /* badge */
      const bx=cell.x+10,by=cell.y+10;
      ctx.fillStyle='rgba(1,105,111,.9)';
      ctx.beginPath(); ctx.roundRect(bx,by,130,40,20); ctx.fill();
      ctx.fillStyle='#fff'; ctx.font='bold 22px Satoshi,sans-serif';
      ctx.textAlign='left'; ctx.textBaseline='middle';
      ctx.fillText('✎ 초점 편집 중',bx+12,by+20);
    }
  });
}
function buildGrid(cols,gap){
  const rows=Math.ceil(photos.length/cols);
  const cw=(canvas.width-gap*(cols+1))/cols, ch=(canvas.height-gap*(rows+1))/rows;
  photos.forEach((_,i)=>{ const col=i%cols,row=Math.floor(i/cols); cellMap.push({idx:i,x:gap+col*(cw+gap),y:gap+row*(ch+gap),w:cw,h:ch}); });
}
function buildStrip(gap){
  const n=photos.length, rh=(canvas.height-gap*(n+1))/n;
  photos.forEach((_,i)=>cellMap.push({idx:i,x:gap,y:gap+i*(rh+gap),w:canvas.width-gap*2,h:rh}));
}
function buildMasonry(cols,gap){
  const cw=(canvas.width-gap*(cols+1))/cols, hs=new Array(cols).fill(gap);
  photos.forEach((p,i)=>{ const r=p.img.height/p.img.width, h=Math.max(160,cw*r), mc=hs.indexOf(Math.min(...hs)); cellMap.push({idx:i,x:gap+mc*(cw+gap),y:hs[mc],w:cw,h}); hs[mc]+=h+gap; });
}
function coverDraw(img,dx,dy,dw,dh,ox,oy,zoom){
  ox=ox??0.5; oy=oy??0.5; zoom=zoom??1;
  const destRatio=dw/dh, srcRatio=img.width/img.height;
  let sw,sh;
  if(srcRatio>destRatio){ sw=img.height*destRatio/zoom; sh=img.height/zoom; }
  else                   { sw=img.width/zoom; sh=img.width/destRatio/zoom; }
  let sx=(img.width-sw)*ox, sy=(img.height-sh)*oy;
  sx=Math.max(0,Math.min(img.width-sw,sx)); sy=Math.max(0,Math.min(img.height-sh,sy));
  ctx.save(); roundPath(dx,dy,dw,dh,16); ctx.clip();
  ctx.drawImage(img,sx,sy,sw,sh,dx,dy,dw,dh); ctx.restore();
}
function roundPath(x,y,w,h,r){
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}
function drawEmpty(){
  ctx.fillStyle='#e9e6df'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#7a7974'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font='500 40px Satoshi,sans-serif'; ctx.fillText('사진을 선택해 주세요',canvas.width/2,canvas.height/2);
}
function download(){
  const a=document.createElement('a'); a.href=canvas.toDataURL('image/png'); a.download='collage.png'; a.click();
}

/* ═══════════════════════════════════════════
   THUMBNAILS — touch long-press drag reorder
═══════════════════════════════════════════ */
let dragSrcIdx=null, dragGhost=null, touchDragTimer=null;

function renderThumbs(){
  thumbsEl.innerHTML='';
  photoCountEl.textContent=photos.length;
  if(!photos.length){
    thumbsEl.innerHTML='<div class="empty-state"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:.35"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg><span>사진을 선택하면 여기 표시됩니다</span></div>';
    return;
  }
  photos.forEach((p,i)=>{
    const el=document.createElement('div');
    el.className='thumb'+(selectedIdx===i?' active':'');
    el.dataset.idx=i;
    el.innerHTML=`<img src="${p.src}" alt="사진 ${i+1}" width="160" height="160" loading="lazy"><span class="badge">${i+1}</span><button class="del" aria-label="삭제" data-idx="${i}"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg></button>`;

    /* tap → select */
    el.addEventListener('click', e => { if(e.target.closest('.del')) return; selectPhoto(i); });

    /* delete */
    el.querySelector('.del').addEventListener('click', e => {
      e.stopPropagation();
      const idx=Number(e.currentTarget.dataset.idx);
      photos.splice(idx,1);
      if(selectedIdx===idx){ selectedIdx=null; hideFocus(); }
      else if(selectedIdx!==null&&selectedIdx>idx) selectedIdx--;
      renderThumbs(); renderCollage();
    });

    /* ── desktop drag reorder ── */
    el.draggable=true;
    el.addEventListener('dragstart', e=>{ dragSrcIdx=i; el.classList.add('drag-ghost'); e.dataTransfer.effectAllowed='move'; });
    el.addEventListener('dragend',   ()=>{ el.classList.remove('drag-ghost'); document.querySelectorAll('.thumb').forEach(t=>t.classList.remove('drag-target')); dragSrcIdx=null; });
    el.addEventListener('dragover',  e=>{ e.preventDefault(); e.dataTransfer.dropEffect='move'; });
    el.addEventListener('dragenter', e=>{ e.preventDefault(); if(dragSrcIdx!==i) el.classList.add('drag-target'); });
    el.addEventListener('dragleave', ()=>el.classList.remove('drag-target'));
    el.addEventListener('drop', e=>{ e.preventDefault(); el.classList.remove('drag-target'); if(dragSrcIdx===null||dragSrcIdx===i) return; doReorder(dragSrcIdx,i); dragSrcIdx=null; });

    /* ── touch drag reorder (long press 400ms → drag) ── */
    let touchSrc=null, touchStartPt=null, moving=false;
    el.addEventListener('touchstart', e=>{
      touchStartPt={x:e.touches[0].clientX,y:e.touches[0].clientY};
      touchDragTimer=setTimeout(()=>{
        touchSrc=i; el.classList.add('drag-ghost');
      },400);
    },{passive:true});

    el.addEventListener('touchmove', e=>{
      if(touchSrc===null){ clearTimeout(touchDragTimer); return; }
      e.preventDefault(); moving=true;
      const t=e.touches[0];
      /* find element under finger */
      const under=document.elementFromPoint(t.clientX,t.clientY);
      const targetThumb=under?.closest('.thumb');
      document.querySelectorAll('.thumb').forEach(x=>x.classList.remove('drag-target'));
      if(targetThumb&&Number(targetThumb.dataset.idx)!==touchSrc) targetThumb.classList.add('drag-target');
    },{passive:false});

    el.addEventListener('touchend', e=>{
      clearTimeout(touchDragTimer);
      el.classList.remove('drag-ghost');
      document.querySelectorAll('.thumb').forEach(x=>x.classList.remove('drag-target'));
      if(touchSrc!==null&&moving){
        const t=e.changedTouches[0];
        const under=document.elementFromPoint(t.clientX,t.clientY);
        const targetThumb=under?.closest('.thumb');
        if(targetThumb){
          const destIdx=Number(targetThumb.dataset.idx);
          if(destIdx!==touchSrc) doReorder(touchSrc,destIdx);
        }
      }
      touchSrc=null; moving=false;
    },{passive:true});

    thumbsEl.appendChild(el);
  });
}

function doReorder(from,to){
  const moved=photos.splice(from,1)[0];
  photos.splice(to,0,moved);
  if(selectedIdx===from) selectedIdx=to;
  else if(selectedIdx!==null){
    if(from<to&&selectedIdx>from&&selectedIdx<=to) selectedIdx--;
    else if(from>to&&selectedIdx>=to&&selectedIdx<from) selectedIdx++;
  }
  renderThumbs(); renderCollage();
}

/* init */
renderThumbs(); renderCollage();
</script>
</body>
</html>
